<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="sitePageTitle">⚡ Инновационный Дневник 8 «В»</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style id="dynamicStyles">
        :root {
            --bg: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            --glass: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            --danger: #ef4444;
            --success: #10b981;
        }
    </style>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; transition: background 0.3s ease; }

        .ticker-notice { width: 100%; max-width: 1300px; background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.25); color: #f59e0b; padding: 12px 20px; border-radius: 14px; margin-bottom: 15px; font-weight: 600; font-size: 14px; display: none; text-align: center; }

        .glass-panel {
            width: 100%;
            max-width: 1300px;
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            min-height: 750px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen { display: none; padding: 40px; flex-direction: column; flex: 1; }
        .screen.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .auth-wrapper {
            max-width: 440px;
            margin: auto;
            width: 100%;
            background: rgba(2, 6, 23, 0.7);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .auth-wrapper h2 { font-size: 32px; font-weight: 800; text-align: center; margin-bottom: 25px; background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .tabs { display: flex; background: rgba(255,255,255,0.04); padding: 4px; border-radius: 14px; margin-bottom: 24px; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-weight: 600; border-radius: 10px; font-size: 14px; }
        .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 14px 18px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: white; font-size: 15px; outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }

        .action-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; display: inline-flex; justify-content: center; align-items: center; gap: 8px; }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
        .toggle-auth { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
        .toggle-auth:hover { color: white; text-decoration: underline; }

        .dashboard { display: grid; grid-template-columns: 320px 1fr; min-height: 750px; flex: 1; }
        .sidebar { border-right: 1px solid var(--glass-border); padding: 35px; display: flex; flex-direction: column; background: rgba(0,0,0,0.15); }
        .main-content { padding: 40px; overflow-y: auto; background: rgba(255,255,255,0.01); }

        .user-card { margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 25px; }
        .user-card h3 { font-size: 20px; font-weight: 700; }
        .user-card p { font-size: 13px; color: var(--accent); margin-top: 4px; font-weight: 600; text-transform: uppercase; }

        .content-nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .nav-tab { padding: 14px 18px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); color: var(--text-muted); border-radius: 12px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .nav-tab.active { background: var(--accent); color: white; border-color: transparent; box-shadow: 0 4px 15px var(--accent-glow); }

        .week-navigation { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 18px 28px; border-radius: 20px; margin-bottom: 30px; border: 1px solid var(--glass-border); }
        .nav-arrow { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .nav-arrow:hover { background: var(--accent); border-color: transparent; }
        .week-title { font-size: 17px; font-weight: 700; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .day-block { background: rgba(255,255,255,0.01); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        .day-header { font-size: 18px; font-weight: 800; color: var(--accent); margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .row-lesson { display: grid; grid-template-columns: 50px 280px 1fr; align-items: center; padding: 14px 0; border-bottom: 1px dashed rgba(255,255,255,0.04); }
        .row-lesson:last-child { border-bottom: none; }
        .lesson-num { color: var(--text-muted); font-weight: 700; font-size: 14px; }
        .lesson-name { font-weight: 600; font-size: 15px; padding-right: 15px; }

        .grades-container { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        
        .grade-view-badge { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 800; font-size: 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); }
        .badge-excellent { background: rgba(16, 185, 129, 0.18); color: #10b981; border-color: rgba(16, 185, 129, 0.35); } 
        .badge-good { background: rgba(59, 130, 246, 0.18); color: #3b82f6; border-color: rgba(59, 130, 246, 0.35); } 
        .badge-satisfactory { background: rgba(245, 158, 11, 0.18); color: #f59e0b; border-color: rgba(245, 158, 11, 0.35); }  
        .badge-unsatisfactory { background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }  
        .badge-critical { background: rgba(220, 38, 38, 0.3); color: #f87171; border-color: #dc2626; }

        .teacher-selector-wrapper { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); padding: 8px 16px; border-radius: 12px; border: 1px solid var(--glass-border); }
        .student-select-dropdown { background: #0f172a; color: white; border: 1px solid var(--glass-border); padding: 8px 14px; border-radius: 8px; font-size: 14px; outline: none; min-width: 220px; }
        .grade-input-field { width: 60px; height: 36px; background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); border-radius: 8px; color: white; text-align: center; font-weight: 800; font-size: 15px; outline: none; }
        .grade-input-field:focus { border-color: var(--accent); background: rgba(255,255,255,0.12); }

        .logout-btn { padding: 12px; background: rgba(239, 68, 68, 0.08); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.15); border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: auto; text-align: center; border: 1px solid transparent; }
        .logout-btn:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="ticker-notice" id="siteNoticeBar"></div>

<div class="glass-panel">

    <div id="authScreen" class="screen active">
        <div class="auth-wrapper">
            <h2 id="authTitle">Авторизация</h2>
            <div class="tabs">
                <button class="tab-btn active" id="roleStudent" onclick="setRole('student')">Ученик</button>
                <button class="tab-btn" id="roleTeacher" onclick="setRole('teacher')">Учитель</button>
            </div>
            <div class="input-group">
                <label>Фамилия и Имя</label>
                <input type="text" id="authName" placeholder="Иванов Иван">
            </div>
            <div class="input-group" id="subjectBlock" style="display: none;">
                <label>Ваш предмет</label>
                <select id="authSubject"></select>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="authPass" placeholder="••••••••">
            </div>
            <button class="action-btn" onclick="processAuth()" id="authBtn">Войти в систему</button>
            <div class="toggle-auth" id="toggleMode" onclick="toggleMode()">У меня нет аккаунта (Регистрация)</div>
        </div>
    </div>

    <div id="dashboardScreen" class="screen">
        <div class="dashboard">
            <aside class="sidebar">
                <div class="user-card">
                    <h3 id="displayUserName">Загрузка...</h3>
                    <p id="displayUserRole">Класс 8 «В»</p>
                </div>
                <div class="content-nav-tabs" style="flex-direction: column;">
                    <div class="nav-tab active">📖 Электронный дневник</div>
                </div>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </aside>

            <main class="main-content">
                <div class="week-navigation">
                    <button class="nav-arrow" onclick="changeWeek(-1)">◀ Пред. Неделя</button>
                    <div class="week-title" id="weekRangeTitle">Загрузка...</div>
                    <button class="nav-arrow" onclick="changeWeek(1)">След. Неделя ▶</button>
                </div>

                <div id="diaryDaysContainer"></div>

                <div id="saveBlock" style="margin-top: 25px; text-align: right; display: none;">
                    <button class="action-btn" style="width: auto; padding: 15px 40px; background: var(--success);" onclick="saveGradesData()">💾 Сохранить оценки</button>
                </div>
            </main>
        </div>
    </div>

</div>

<script>
    const SUPABASE_URL = "https://kyfnpsnnymhyapktyulf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_YOncKyjzNTiiKkCzdWbEBg_dJylOA-9";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let timetable = {
        "Понедельник": ["ФИЗИКА", "ОБЩАЯ ИСТОРИЯ", "ХИМИЯ", "АЛГЕБРА", "ГОСС-ЯЗ", "ИСТОРИЯ ТАДЖИКСКОГО НАРОДА"],
        "Вторник": ["БИОЛОГИЯ", "АНГЛ-ЯЗ", "ГЕОМЕТРИЯ", "АЛГЕБРА", "ФИЗРА"],
        "Среда": ["ГЕОМЕТРИЯ", "ФИЗИКА ОБЩАЯ", "АНГЛ-ЯЗ", "РУСС-ЯЗ", "ЛИТ-РА", "ГЕОГРАФИЯ"],
        "Четверг": ["ИСТОРИЯ", "КЛ-ЧАС", "РУСС-ЯЗ", "ГОСС-ПРАВО", "ОБЖ", "ГОСС-ЯЗ"],
        "Пятница": ["ИКТ", "БИОЛОГИЯ", "РУСС-ЯЗ", "ФИЗРА", "ЛИТ-РА", "ГЕОГРАФИЯ"],
        "Суббота": ["ХИМИЯ", "ЧЕРЧЕНИЕ", "ГОСС-ЯЗ"]
    };

    let allUsers = [];
    let globalGrades = {};
    let currentUser = null;
    let currentRole = 'student';
    let isRegisterMode = false;
    let currentWeekIndex = 0;
    let teacherSelectedStudent = "";

    function getUniqueSubjectsFromTimetable() {
        const unique = [];
        for(let day in timetable) {
            timetable[day].forEach(sub => { if(!unique.includes(sub)) unique.push(sub); });
        }
        return unique.sort();
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadOnlineConfig();
    });

    async function loadOnlineConfig() {
        let { data: config } = await supabaseClient.from('diary_config').select('*').single();
        if (config) {
            if(config.timetable) timetable = config.timetable;
            if(config.site_title) document.getElementById('sitePageTitle').innerText = config.site_title;
            if(config.site_accent) {
                document.getElementById('dynamicStyles').innerHTML = `
                    :root {
                        --bg: ${config.site_bg || 'radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%)'};
                        --glass: rgba(15, 23, 42, 0.65);
                        --glass-border: rgba(255, 255, 255, 0.08);
                        --accent: ${config.site_accent};
                        --accent-glow: ${config.site_accent}55;
                        --text-main: #f8fafc;
                        --text-muted: #94a3b8;
                        --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
                        --danger: #ef4444;
                        --success: #10b981;
                    }
                `;
            }
            const noticeBar = document.getElementById('siteNoticeBar');
            if(config.site_notice && config.site_notice.trim() !== "") {
                noticeBar.innerText = config.site_notice;
                noticeBar.style.display = 'block';
            } else {
                noticeBar.style.display = 'none';
            }
        }

        let { data: users } = await supabaseClient.from('diary_users').select('*');
        if (users) allUsers = users;

        let { data: grades } = await supabaseClient.from('diary_grades').select('*');
        globalGrades = {};
        if (grades) { grades.forEach(g => { globalGrades[g.lesson_key] = g.grades_data; }); }

        const uniqueSubjects = getUniqueSubjectsFromTimetable();
        const subSelect = document.getElementById('authSubject');
        if (subSelect) {
            subSelect.innerHTML = '';
            uniqueSubjects.forEach(s => { subSelect.innerHTML += `<option value="${s}">${s}</option>`; });
        }

        const today = new Date();
        const foundIndex = academicWeeks.findIndex(w => today >= parseDate(w.startStr) && today <= parseDate(w.endStr));
        if (foundIndex !== -1) currentWeekIndex = foundIndex;

        if(currentUser) renderWeekDiary();
    }

    function parseDate(str) {
        const parts = str.split('.');
        return new Date(parts[2], parts[1] - 1, parts[0]);
    }

    function generateAcademicWeeks() {
        let weeks = []; let startDate = new Date(2026, 8, 1);
        while(startDate.getDay() !== 1) { startDate.setDate(startDate.getDate() + 1); }
        for(let i = 0; i < 35; i++) {
            let monday = new Date(startDate); let saturday = new Date(startDate); saturday.setDate(monday.getDate() + 5);
            weeks.push({
                id: i, startStr: monday.toLocaleDateString('ru-RU'), endStr: saturday.toLocaleDateString('ru-RU'),
                daysDates: {
                    "Понедельник": new Date(monday), "Вторник": new Date(monday.getTime() + 24*60*60*1000),
                    "Среда": new Date(monday.getTime() + 2*24*60*60*1000), "Четверг": new Date(monday.getTime() + 3*24*60*60*1000),
                    "Пятница": new Date(monday.getTime() + 4*24*60*60*1000), "Суббота": new Date(saturday)
                }
            });
            startDate.setDate(startDate.getDate() + 7);
        }
        return weeks;
    }
    const academicWeeks = generateAcademicWeeks();

    function setRole(role) {
        currentRole = role;
        document.getElementById('roleStudent').classList.toggle('active', role === 'student');
        document.getElementById('roleTeacher').classList.toggle('active', role === 'teacher');
        document.getElementById('subjectBlock').style.display = (role === 'teacher') ? 'block' : 'none';
    }

    function toggleMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('authTitle').innerText = isRegisterMode ? "Регистрация" : "Авторизация";
        document.getElementById('authBtn').innerText = isRegisterMode ? "Зарегистрироваться" : "Войти в систему";
        document.getElementById('toggleMode').innerText = isRegisterMode ? "Уже есть аккаунт? Войти" : "Регистрация";
    }

    async function processAuth() {
        await loadOnlineConfig();
        const name = document.getElementById('authName').value.trim();
        const pass = document.getElementById('authPass').value.trim();
        const subject = document.getElementById('authSubject').value;
        if(!name || !pass) return alert("Заполните поля!");

        if(isRegisterMode) {
            let exists = allUsers.find(u => u.name.toLowerCase() === name.toLowerCase());
            if(exists) return alert("Пользователь уже существует!");
            await supabaseClient.from('diary_users').insert([{ name, pass, role: currentRole, subject: currentRole === 'teacher' ? subject : null }]);
            alert("Регистрация успешна!"); toggleMode();
        } else {
            let account = allUsers.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
            if(account) { currentUser = account; enterSystem(); } else { alert("Неверный логин или пароль!"); }
        }
    }

    function enterSystem() {
        document.getElementById('authScreen').classList.remove('active');
        document.getElementById('dashboardScreen').classList.add('active');
        document.getElementById('displayUserName').innerText = currentUser.name;
        
        if(currentUser.role === 'teacher') {
            document.getElementById('displayUserRole').innerText = `Учитель: ${currentUser.subject}`;
            document.getElementById('saveBlock').style.display = 'block';
        } else {
            document.getElementById('displayUserRole').innerText = `Ученик 8 «В» класса`;
            document.getElementById('saveBlock').style.display = 'none';
        }
        renderWeekDiary();
    }

    function logout() { currentUser = null; document.getElementById('dashboardScreen').classList.remove('active'); document.getElementById('authScreen').classList.add('active'); }

    function changeWeek(direction) {
        let newIndex = currentWeekIndex + direction;
        if(newIndex >= 0 && newIndex < academicWeeks.length) { currentWeekIndex = newIndex; renderWeekDiary(); }
    }

    function selectStudentForTeacher(studentName) { teacherSelectedStudent = studentName; renderWeekDiary(); }

    function renderWeekDiary() {
        const week = academicWeeks[currentWeekIndex];
        document.getElementById('weekRangeTitle').innerText = `Неделя ${week.id + 1} (${week.startStr} — ${week.endStr})`;
        const container = document.getElementById('diaryDaysContainer');
        container.innerHTML = '';

        if(currentUser && currentUser.role === 'teacher') {
            let selectHTML = `<div class="teacher-selector-wrapper" style="margin-bottom:20px;"><label style="font-weight:700;">Ученик:</label><select class="student-select-dropdown" onchange="selectStudentForTeacher(this.value)"><option value="">-- Выберите ученика --</option>`;
            allUsers.filter(u => u.role === 'student').forEach(st => {
                selectHTML += `<option value="${st.name}" ${st.name === teacherSelectedStudent ? 'selected' : ''}>${st.name}</option>`;
            });
            container.innerHTML += selectHTML + `</select></div>`;
        }

        for(let day in timetable) {
            let dayDate = new Date(week.daysDates[day]).toLocaleDateString('ru-RU', {day: 'numeric', month: 'long'});
            let dayBlock = document.createElement('div'); dayBlock.className = 'day-block';
            let html = `<div class="day-header"><span>${day}</span><span style="font-size:13px; color:var(--text-muted);">${dayDate}</span></div>`;
            
            timetable[day].forEach((lessonName, index) => {
                let lessonNum = index + 1;
                let targetUser = (currentUser && currentUser.role === 'teacher') ? teacherSelectedStudent : (currentUser ? currentUser.name : '');
                let lessonKey = `w${week.id}_${day}_L${lessonNum}_${lessonName}_${targetUser}`;
                let currentGrades = globalGrades[lessonKey] || [];
                let gradesHTML = '';

                if(currentUser && currentUser.role === 'teacher' && lessonName.toLowerCase() === currentUser.subject.toLowerCase() && teacherSelectedStudent) {
                    let v1 = currentGrades[0] || '', v2 = currentGrades[1] || '', v3 = currentGrades[2] || '';
                    gradesHTML = `
                        <div class="grades-container">
                            <input type="text" class="grade-input-field ${getGradeClass10(v1)}" data-key="${lessonKey}" data-idx="0" value="${v1}" maxlength="2">
                            <input type="text" class="grade-input-field ${getGradeClass10(v2)}" data-key="${lessonKey}" data-idx="1" value="${v2}" maxlength="2">
                            <input type="text" class="grade-input-field ${getGradeClass10(v3)}" data-key="${lessonKey}" data-idx="2" value="${v3}" maxlength="2">
                        </div>
                    `;
                } else {
                    currentGrades.forEach(g => { if(g) gradesHTML += `<span class="grade-view-badge ${getGradeClass10(g)}">${g}</span>`; });
                }
                html += `<div class="row-lesson"><div class="lesson-num">${lessonNum}</div><div class="lesson-name">${lessonName}</div><div class="grades-container">${gradesHTML || '—'}</div></div>`;
            });
            dayBlock.innerHTML = html; container.appendChild(dayBlock);
        }
    }

    function getGradeClass10(g) {
        let v = parseFloat(g); if(isNaN(v)) return '';
        if(v >= 9) return 'badge-excellent'; if(v >= 7) return 'badge-good';
        if(v >= 5) return 'badge-satisfactory'; if(v >= 3) return 'badge-unsatisfactory';
        return 'badge-critical';
    }

    async function saveGradesData() {
        const inputs = document.querySelectorAll('.grade-input-field');
        let localChanges = {};
        inputs.forEach(input => {
            let key = input.dataset.key, idx = parseInt(input.dataset.idx), val = input.value.trim();
            if(!localChanges[key]) localChanges[key] = globalGrades[key] || ['', '', ''];
            localChanges[key][idx] = val;
        });

        for(let key in localChanges) {
            let arr = localChanges[key].filter(x => x !== '');
            globalGrades[key] = arr;
            let { data } = await supabaseClient.from('diary_grades').select('*').eq('lesson_key', key);
            if(data && data.length > 0) {
                await supabaseClient.from('diary_grades').update({ grades_data: arr }).eq('lesson_key', key);
            } else if(arr.length > 0) {
                await supabaseClient.from('diary_grades').insert([{ lesson_key: key, grades_data: arr }]);
            }
        }
        alert("Оценки сохранены!"); loadOnlineConfig();
    }
</script>
</body>
</html>
