<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Инновационный Дневник 8 «В»</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Эти цвета заменяются автоматически из CMS */
            --bg: radial-gradient(circle at 50% 50%, #111827 0%, #030712 100%);
            --glass: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .glass-panel {
            width: 100%;
            max-width: 1300px;
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            min-height: 750px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .screen { display: none; padding: 40px; flex-direction: column; flex: 1; }
        .screen.active { display: flex; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Форма входа */
        .auth-wrapper {
            max-width: 420px;
            margin: auto;
            width: 100%;
            background: rgba(3, 7, 18, 0.6);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .auth-wrapper h2 { font-size: 30px; font-weight: 800; text-align: center; margin-bottom: 25px; background: linear-gradient(to right, #fff, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .tabs { display: flex; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 12px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-weight: 600; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 0 12px var(--accent-glow); }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px 16px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 10px; color: white; font-size: 15px; outline: none; }
        .input-group textarea { resize: none; height: 80px; font-size: 14px; }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: var(--accent); }

        .action-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 15px var(--accent-glow); }
        .toggle-auth { text-align: center; margin-top: 15px; font-size: 13px; color: var(--text-muted); cursor: pointer; text-decoration: underline; }

        /* Рабочее пространство */
        .dashboard { display: grid; grid-template-columns: 280px 1fr; min-height: 750px; flex: 1; }
        .sidebar { border-right: 1px solid var(--glass-border); padding: 30px; display: flex; flex-direction: column; background: rgba(0,0,0,0.1); }
        .main-content { padding: 40px; overflow-y: auto; }

        .user-card { margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .user-card h3 { font-size: 18px; font-weight: 700; }
        .user-card p { font-size: 13px; color: var(--accent); margin-top: 2px; }

        .content-nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .nav-tab { padding: 10px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: var(--text-muted); border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .nav-tab.active { background: var(--accent); color: white; border-color: transparent; }

        .teacher-remark-panel { background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.15); padding: 20px; border-radius: 16px; margin-bottom: 30px; }
        .teacher-remark-panel h4 { font-size: 15px; color: var(--danger); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        .week-navigation { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px 25px; border-radius: 16px; margin-bottom: 30px; border: 1px solid var(--glass-border); }
        .nav-arrow { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .nav-arrow:hover { background: #4338ca; }
        .week-title { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }

        /* Расписание */
        .day-block { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .day-header { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
        
        .row-lesson { display: grid; grid-template-columns: 40px 240px 1fr; align-items: center; padding: 12px 0; border-bottom: 1px dashed rgba(255,255,255,0.03); }
        .lesson-num { color: var(--text-muted); font-weight: 600; font-size: 14px; }
        .lesson-name { font-weight: 600; font-size: 14px; letter-spacing: 0.5px; padding-right: 10px; }

        .grades-container { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        .grade-view-badge { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 700; font-size: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); }
        .badge-high { background: rgba(16, 185, 129, 0.15); color: #10b981; border-color: rgba(16, 185, 129, 0.3); } 
        .badge-good { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border-color: rgba(59, 130, 246, 0.3); } 
        .badge-mid { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); }  
        .badge-low { background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }  

        .teacher-selector-wrapper { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); padding: 6px 14px; border-radius: 10px; border: 1px solid var(--glass-border); }
        .student-select-dropdown { background: #111827; color: white; border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 6px; font-size: 14px; outline: none; min-width: 200px; }
        .grade-input-field { width: 55px; height: 32px; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border); border-radius: 6px; color: white; text-align: center; font-weight: 700; font-size: 15px; outline: none; }
        .grade-input-field:focus { border-color: var(--accent); background: rgba(255,255,255,0.15); }
        
        .remark-item { background: rgba(239,68,68,0.04); border: 1px solid rgba(239,68,68,0.15); border-left: 4px solid var(--danger); padding: 20px; border-radius: 12px; margin-bottom: 15px; position: relative;}
        .remark-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
        .remark-sender { color: var(--danger); font-weight: 700; }
        .remark-text { font-size: 15px; font-weight: 500; line-height: 1.5; color: var(--text-main); }

        .alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .alert-overlay.show { opacity: 1; pointer-events: auto; }
        .alert-modal { background: #1e1b4b; border: 2px solid var(--danger); box-shadow: 0 0 40px var(--danger-glow); width: 100%; max-width: 550px; padding: 35px; border-radius: 24px; text-align: center; transform: scale(0.9); transition: transform 0.3s ease; }
        .alert-overlay.show .alert-modal { transform: scale(1); }
        
        .alert-icon { width: 64px; height: 64px; background: rgba(239,68,68,0.2); color: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; margin: 0 auto 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 15px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        
        .alert-modal h3 { font-size: 24px; font-weight: 800; color: white; margin-bottom: 10px; }
        .alert-modal p { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
        .alert-scroll-box { max-height: 240px; overflow-y: auto; text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; }
        .alert-inner-item { border-bottom: 1px dashed rgba(239,68,68,0.2); padding-bottom: 10px; margin-bottom: 10px; }

        .logout-btn { padding: 10px; background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: auto; transition: 0.2s; }
        .logout-btn:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="alert-overlay" id="remarkAlertOverlay">
    <div class="alert-modal">
        <div class="alert-icon">⚠️</div>
        <h3>Внимание! Замечание</h3>
        <p>Учитель оставил записи в вашем дневнике:</p>
        <div class="alert-scroll-box" id="alertScrollBox"></div>
        <button class="action-btn" style="background: var(--danger);" onclick="closeRemarkAlert()">Я ознакомлен(-а)</button>
    </div>
</div>

<div class="glass-panel">

    <div id="authScreen" class="screen active">
        <div class="auth-wrapper">
            <h2 id="authTitle">Авторизация</h2>
            <div class="tabs">
                <button class="tab-btn active" id="roleStudent" onclick="setRole('student')">Ученик</button>
                <button class="tab-btn" id="roleTeacher" onclick="setRole('teacher')">Учитель</button>
            </div>
            <div class="input-group">
                <label>Фамилия и Имя</label>
                <input type="text" id="authName" placeholder="Иванов Иван">
            </div>
            <div class="input-group" id="subjectBlock" style="display: none;">
                <label>Ваш предмет</label>
                <select id="authSubject"></select>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="authPass" placeholder="••••••••">
            </div>
            <button class="action-btn" onclick="processAuth()" id="authBtn">Войти в журнал</button>
            <div class="toggle-auth" id="toggleMode" onclick="toggleMode()">У меня нет аккаунта (Регистрация)</div>
        </div>
    </div>

    <div id="dashboardScreen" class="screen">
        <div class="dashboard">
            <aside class="sidebar">
                <div class="user-card">
                    <h3 id="displayUserName">Загрузка...</h3>
                    <p id="displayUserRole">Класс 8 «В»</p>
                </div>
                <div class="content-nav-tabs" style="flex-direction: column; gap: 8px;">
                    <div class="nav-tab active" id="tabDiaryLink" onclick="switchTab('diary')">📖 Электронный дневник</div>
                    <div class="nav-tab" id="tabRemarksLink" onclick="switchTab('remarks')">🚨 Замечания <span id="remarkCountBadge" style="display:none; background:var(--danger); color:white; padding:2px 6px; border-radius:10px; font-size:11px;">0</span></div>
                </div>
                <button class="logout-btn" onclick="logout()">Выйти из системы</button>
            </aside>

            <main class="main-content">
                <div id="tabContentDiary">
                    <div id="teacherRemarkZone" class="teacher-remark-panel" style="display: none;">
                        <h4>🚨 Кабинет замечаний учителя</h4>
                        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-bottom: 15px;">
                            <div class="input-group" style="margin:0;">
                                <label>Кому оставить замечание?</label>
                                <select id="remarkStudentTarget" class="student-select-dropdown" style="width:100%; height:45px;"></select>
                            </div>
                            <div class="input-group" style="margin:0;">
                                <label>Текст замечания</label>
                                <textarea id="remarkText" placeholder="Например: Сорвал урок..."></textarea>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <button class="action-btn" style="width: auto; background: var(--danger); padding: 10px 25px;" onclick="sendRemark()">⚠️ Направить замечание</button>
                        </div>
                    </div>

                    <div class="week-navigation">
                        <button class="nav-arrow" onclick="changeWeek(-1)">◀ Пред. Неделя</button>
                        <div class="week-title" id="weekRangeTitle">Загрузка расписания...</div>
                        <button class="nav-arrow" onclick="changeWeek(1)">След. Неделя ▶</button>
                    </div>

                    <div id="diaryDaysContainer"></div>

                    <div id="saveBlock" style="margin-top: 25px; text-align: right; display: none;">
                        <button class="action-btn" style="width: auto; padding: 15px 40px;" onclick="saveGradesData()">💾 Сохранить оценки</button>
                    </div>
                </div>

                <div id="tabContentRemarks" style="display: none;">
                    <h2 style="margin-bottom: 20px; font-weight: 800;">📋 Исторический архив замечаний</h2>
                    <div id="remarksListContainer"></div>
                </div>
            </main>
        </div>
    </div>

</div>

<script>
    // Изначально пустое расписание. Оно прилетит из CMS онлайн-файла data/config.json
    let timetable = {}; 

    // Загрузка конфигурации ИЗ ОНЛАЙНА (CMS)
    async function loadOnlineConfig() {
        try {
            // Файл data/config.json будет генерироваться вашей Decap CMS автоматически!
            const response = await fetch('/data/config.json');
            const config = await response.json();
            
            // Динамически применяем цвета онлайн
            if(config.accent_color) document.documentElement.style.setProperty('--accent', config.accent_color);
            if(config.glass_bg) document.documentElement.style.setProperty('--glass', `rgba(${hexToRgb(config.glass_bg)}, 0.7)`);
            
            // Парсим предметы из строк, введенных в админке
            timetable = {
                "Понедельник": config.mon ? config.mon.split(',').map(s => s.trim()) : [],
                "Вторник": config.tue ? config.tue.split(',').map(s => s.trim()) : [],
                "Среда": config.wed ? config.wed.split(',').map(s => s.trim()) : [],
                "Четверг": config.thu ? config.thu.split(',').map(s => s.trim()) : [],
                "Пятница": config.fri ? config.fri.split(',').map(s => s.trim()) : [],
                "Суббота": config.sat ? config.sat.split(',').map(s => s.trim()) : []
            };

            // Перестраиваем селектор предметов для учителей
            const uniqueSubjects = [];
            for(let day in timetable) {
                timetable[day].forEach(sub => { if(sub && !uniqueSubjects.includes(sub)) uniqueSubjects.push(sub); });
            }
            const subSelect = document.getElementById('authSubject');
            subSelect.innerHTML = '';
            uniqueSubjects.sort().forEach(s => { subSelect.innerHTML += `<option value="${s}">${s}</option>`; });
            
            if(currentUser) renderWeekDiary();

        } catch (e) {
            console.log("Файл онлайн-конфигурации еще не создан CMS. Запуск демо-режима.", e);
            // Фолбэк на случай если CMS еще ни разу не сохраняла файл
            timetable = {"Понедельник":["ФИЗИКА ОБЩАЯ","АЛГЕБРА"],"Вторник":["БИОЛОГИЯ","ФИЗРА"],"Среда":["РУСС-ЯЗ"],"Четверг":["ОБЖ"],"Пятница":["ИКТ"],"Суббота":["ХИМИЯ"]};
        }
    }

    function hexToRgb(hex) {
        var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : "17, 24, 39";
    }

    function generateAcademicWeeks() {
        let weeks = []; let startDate = new Date(2026, 8, 1);
        while(startDate.getDay() !== 1) { startDate.setDate(startDate.getDate() + 1); }
        for(let i = 0; i < 35; i++) {
            let monday = new Date(startDate); let saturday = new Date(startDate); saturday.setDate(monday.getDate() + 5);
            weeks.push({
                id: i, startStr: monday.toLocaleDateString('ru-RU'), endStr: saturday.toLocaleDateString('ru-RU'),
                daysDates: {
                    "Понедельник": new Date(monday), "Вторник": new Date(monday.getTime() + 24*60*60*1000),
                    "Среда": new Date(monday.getTime() + 2*24*60*60*1000), "Четверг": new Date(monday.getTime() + 3*24*60*60*1000),
                    "Пятница": new Date(monday.getTime() + 4*24*60*60*1000), "Суббота": new Date(saturday)
                }
            });
            startDate.setDate(startDate.getDate() + 7);
        }
        return weeks;
    }

    const academicWeeks = generateAcademicWeeks();
    let currentWeekIndex = 0;

    if (!localStorage.getItem('diary_storage_v3')) {
        localStorage.setItem('diary_storage_v3', JSON.stringify({ users: [], globalGrades: {}, remarks: [] }));
    }
    let coreDB = JSON.parse(localStorage.getItem('diary_storage_v3'));
    let currentRole = 'student'; let isRegisterMode = false; let currentUser = null; let activeTab = 'diary';

    function syncStorage() { localStorage.setItem('diary_storage_v3', JSON.stringify(coreDB)); }

    function setRole(role) {
        currentRole = role;
        document.getElementById('roleStudent').classList.toggle('active', role === 'student');
        document.getElementById('roleTeacher').classList.toggle('active', role === 'teacher');
        document.getElementById('subjectBlock').style.display = (role === 'teacher' && isRegisterMode) ? 'block' : 'none';
    }

    function toggleMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('authTitle').innerText = isRegisterMode ? "Регистрация" : "Авторизация";
        document.getElementById('authBtn').innerText = isRegisterMode ? "Зарегистрироваться" : "Войти в журнал";
        document.getElementById('toggleMode').innerText = isRegisterMode ? "Уже есть аккаунт? Войти" : "Регистрация";
        setRole(currentRole);
    }

    function processAuth() {
        const name = document.getElementById('authName').value.trim();
        const pass = document.getElementById('authPass').value.trim();
        const subject = document.getElementById('authSubject').value;
        if(!name || !pass) return alert("Заполните поля!");

        if(isRegisterMode) {
            let exists = coreDB.users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.role === currentRole);
            if(exists) return alert("Пользователь уже есть!");
            coreDB.users.push({ name, pass, role: currentRole, subject: currentRole === 'teacher' ? subject : null });
            syncStorage(); alert("Успешно!"); toggleMode();
        } else {
            let account = coreDB.users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass && u.role === currentRole);
            if(account) { currentUser = account; enterSystem(); } else { alert("Ошибка входа!"); }
        }
    }

    function switchTab(tabName) {
        activeTab = tabName;
        document.getElementById('tabDiaryLink').classList.toggle('active', tabName === 'diary');
        document.getElementById('tabRemarksLink').classList.toggle('active', tabName === 'remarks');
        document.getElementById('tabContentDiary').style.display = tabName === 'diary' ? 'block' : 'none';
        document.getElementById('tabContentRemarks').style.display = tabName === 'remarks' ? 'block' : 'none';
        if(tabName === 'remarks') renderRemarksArchive();
    }

    function enterSystem() {
        document.getElementById('authScreen').classList.remove('active');
        document.getElementById('dashboardScreen').classList.add('active');
        document.getElementById('displayUserName').innerText = currentUser.name;
        switchTab('diary');
        const allStudents = coreDB.users.filter(u => u.role === 'student');

        if(currentUser.role === 'teacher') {
            document.getElementById('displayUserRole').innerText = `Учитель: ${currentUser.subject}`;
            document.getElementById('saveBlock').style.display = 'block';
            document.getElementById('teacherRemarkZone').style.display = 'block';
            const rSel = document.getElementById('remarkStudentTarget');
            rSel.innerHTML = '<option value="">-- Выберите ученика --</option>';
            allStudents.forEach(st => { rSel.innerHTML += `<option value="${st.name}">${st.name}</option>`; });
        } else {
            document.getElementById('displayUserRole').innerText = `Ученик 8 «В» класса`;
            document.getElementById('saveBlock').style.display = 'none';
            document.getElementById('teacherRemarkZone').style.display = 'none';
            checkUnreadRemarksForStudent();
        }
        updateRemarkBadgeCount();
        renderWeekDiary();
    }

    function logout() { currentUser = null; document.getElementById('dashboardScreen').classList.remove('active'); document.getElementById('authScreen').classList.add('active'); }

    function sendRemark() {
        const targetStudent = document.getElementById('remarkStudentTarget').value;
        const text = document.getElementById('remarkText').value.trim();
        if(!targetStudent || !text) return alert("Заполните поля!");
        const now = new Date();
        coreDB.remarks.push({
            id: Date.now(), studentName: targetStudent, teacherName: currentUser.name,
            subject: currentUser.subject, text: text, date: `${now.toLocaleDateString('ru-RU')} в ${now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}`,
            isReadByStudent: false
        });
        syncStorage(); alert("Отправлено!"); document.getElementById('remarkText').value = "";
    }

    function checkUnreadRemarksForStudent() {
        let unread = coreDB.remarks.filter(r => r.studentName.toLowerCase() === currentUser.name.toLowerCase() && !r.isReadByStudent);
        if(unread.length > 0) {
            const box = document.getElementById('alertScrollBox'); box.innerHTML = '';
            unread.forEach(r => {
                box.innerHTML += `<div class="alert-inner-item"><div style="font-size:12px; color:#f87171; font-weight:700;">От: ${r.teacherName} (${r.subject}) • ${r.date}</div><div style="color:#fff; margin-top:5px;">«${r.text}»</div></div>`;
                r.isReadByStudent = true;
            });
            syncStorage(); document.getElementById('remarkAlertOverlay').classList.add('show');
        }
    }

    function closeRemarkAlert() { document.getElementById('remarkAlertOverlay').classList.remove('show'); }
    function updateRemarkBadgeCount() {
        const badge = document.getElementById('remarkCountBadge');
        if(currentUser && currentUser.role === 'student') {
            let cnt = coreDB.remarks.filter(r => r.studentName.toLowerCase() === currentUser.name.toLowerCase()).length;
            if(cnt > 0) { badge.innerText = cnt; badge.style.display = 'inline-block'; return; }
        }
        badge.style.display = 'none';
    }

    function renderRemarksArchive() {
        const container = document.getElementById('remarksListContainer'); container.innerHTML = '';
        let filtered = currentUser.role === 'student' ? coreDB.remarks.filter(r => r.studentName.toLowerCase() === currentUser.name.toLowerCase()) : coreDB.remarks;
        if(filtered.length === 0) { container.innerHTML = `<div style="color:var(--text-muted); text-align:center; padding:40px;">Замечаний нет!</div>`; return; }
        filtered.slice().reverse().forEach(r => {
            container.innerHTML += `<div class="remark-item"><div class="remark-meta"><div>Кому: <strong>${r.studentName}</strong></div><div class="remark-sender">От: ${r.teacherName}</div></div><div class="remark-text">« ${r.text} »</div><div style="font-size:11px; color:var(--text-muted); text-align:right; margin-top:10px;">📅 ${r.date}</div></div>`;
        });
    }

    function changeWeek(direction) { let newIdx = currentWeekIndex + direction; if(newIdx >= 0 && newIdx < academicWeeks.length) { currentWeekIndex = newIdx; renderWeekDiary(); } }
    function handleStudentSelectChange(sel, inpId, key) { const val = sel.value; const inp = document.getElementById(inpId); if (!val) { inp.value = ""; inp.disabled = true; inp.removeAttribute('data-student'); return; } inp.disabled = false; inp.setAttribute('data-student', val); inp.value = (coreDB.globalGrades[key] || {})[val] || ""; }
    function getBadgeColorClass(grade) { let g = parseInt(grade); if(g >= 9) return 'badge-high'; if(g >= 7) return 'badge-good'; if(g >= 5) return 'badge-mid'; return 'badge-low'; }

    function renderWeekDiary() {
        const week = academicWeeks[currentWeekIndex];
        document.getElementById('weekRangeTitle').innerText = `Неделя: ${week.startStr} — ${week.endStr}`;
        const container = document.getElementById('diaryDaysContainer'); container.innerHTML = '';

        for(let dayName in timetable) {
            let dateKey = week.daysDates[dayName].toLocaleDateString('ru-RU');
            let dayHTML = `<div class="day-block"><div class="day-header">${dayName.toUpperCase()} (${dateKey})</div>`;

            timetable[dayName].forEach((lesson, idx) => {
                if(!lesson) return;
                dayHTML += `<div class="row-lesson"><div class="lesson-num">${idx + 1}</div><div class="lesson-name">${lesson}</div><div class="grades-container">`;
                let lessonStorageKey = `${dateKey}_${lesson}_${idx}`;

                if(currentUser.role === 'student') {
                    let myGrade = (coreDB.globalGrades[lessonStorageKey] || {})[currentUser.name] || "";
                    dayHTML += myGrade ? `<span class="grade-view-badge ${getBadgeColorClass(myGrade)}">${myGrade}</span>` : `<span style="color:var(--text-muted); font-size:13px;">—</span>`;
                } else {
                    if(currentUser.subject === lesson) {
                        let allStudents = coreDB.users.filter(u => u.role === 'student');
                        if(allStudents.length === 0) { dayHTML += `<span style="color:var(--text-muted); font-size:13px;">Нет учеников</span>`; } 
                        else {
                            let inputId = `input_${lessonStorageKey}`; let selectId = `select_${lessonStorageKey}`;
                            dayHTML += `<div class="teacher-selector-wrapper"><select id="${selectId}" class="student-select-dropdown" onchange="handleStudentSelectChange(this, '${inputId}', '${lessonStorageKey}')"><option value="">-- Выберите ученика --</option>`;
                            allStudents.forEach(st => { dayHTML += `<option value="${st.name}">${st.name}</option>`; });
                            dayHTML += `</select><input type="text" id="${inputId}" class="grade-input-field" data-key="${lessonStorageKey}" placeholder="-", maxlength="2"></div>`;
                        }
                    } else { dayHTML += `<span style="color:rgba(255,255,255,0.2); font-size:13px;">Другой предмет</span>`; }
                }
                dayHTML += `</div></div>`;
            });
            dayHTML += `</div>`; container.innerHTML += dayHTML;
        }
    }

    function saveGradesData() {
        document.querySelectorAll('.grade-input-field').forEach(input => {
            let key = input.getAttribute('data-key'); let student = input.getAttribute('data-student'); if(!student) return;
            let val = input.value.trim(); let num = parseInt(val);
            if(val === "" || (!isNaN(num) && num >= 1 && num <= 10)) {
                if(!coreDB.globalGrades[key]) coreDB.globalGrades[key] = {};
                coreDB.globalGrades[key][student] = val;
            }
        });
        syncStorage(); alert("Сохранено!"); renderWeekDiary();
    }

    // Запуск процесса загрузки расписания и стилей из CMS
    loadOnlineConfig();
</script>

</body>
</html>
